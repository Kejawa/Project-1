apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: nodeapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo 
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: nodeapp-secret
              key: MONGO_USERNAME
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nodeapp-secret
              key: MONGO_PASSWORD   
        - name: MONGO_INITDB_DATABASE
          valueFrom:
            secretKeyRef:
              name: nodeapp-secret
              key: MONGO_DB                
        volumeMounts:
        - name: mongo-storage
          mountPath: /data/db
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongo-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim      
metadata:
  name: mongo-pvc
  namespace: nodeapp
spec:
  accessModes:
  - ReadWriteOnce # only one Pod can use it at a time
  resources:
    requests:
      storage: 1Gi                       
