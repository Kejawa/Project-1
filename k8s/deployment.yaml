apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeapp
  namespace: nodeapp
  labels:
    app: nodeapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodeapp 
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1  #create 1 extra pod during updates
      maxUnavailable: 0  #zero max no of pods can be down until new ones are created
  template: 
    metadata:
      labels:
        app: nodeapp
    spec:    
      containers:
      - name: nodeapp
        image: kejawa/project-1:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: nodeapp-config
        env:
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: nodeapp-secret
              key: MONGO_USERNAME
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nodeapp-secret
              key: MONGO_PASSWORD   
        - name: MONGO_DB
          valueFrom:
            secretKeyRef:
              name: nodeapp-secret
              key: MONGO_DB     
        - name: MONGO_HOSTNAME
          value: "mongodb"
        - name: MONGO_PORT
          value: "27017"                         
        livenessProbe: # restarts a crashed container.
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe: # stops traffic to a pod that's not ready yet
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10  
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"