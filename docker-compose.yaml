version: '5.1.1'
services:

# #  # DB: Mongo
  mongodb:
    image: mongo
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db  
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5

# # Node.js

 # build:
      # context: .
      # dockerfile: Dockerfile
  app:
    image: kejawa/project-1:latest
    container_name: app
    restart: unless-stopped
    environment:
      MODE_ENV: production
      PORT: 8080
      MONGO_USERNAME: ${MONGO_USERNAME}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_DB: ${MONGO_DB}
      MONGO_HOSTNAME: ${MONGO_HOSTNAME}
      MONGO_PORT: ${MONGO_PORT}
    depends_on:
       mongodb:
          condition: service_healthy
    networks:
      - app_network
    ports: 
      - "3001:8080"

# Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app_network
    ports:
      - "80:80"  

networks:
  app_network:
    driver: bridge

volumes:
  mongo_data: